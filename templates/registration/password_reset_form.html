{% load static %}
<link rel = "stylesheet" href = "{% static 'css/style.css' %}">
{% block content %}
<div class = "wrapper">
    <div class = "forms">
<h1 class = "innerforms">Forgot Your Password</h1>
<p class = "innerforms">Enter your email address below, and we'll send instructions for setting a new one</p>
<form method = "post">
    {% csrf_token %}
    <div class = "innerforms">
        <label for = "email">Enter Your Email</label>
        {{form.email}}
        {{form.email.errors}}
    </div>
    <button type = "submit" class = "submit">Send Me Instructions</button>
</form>
</div>
</div>
{% endblock content %}
