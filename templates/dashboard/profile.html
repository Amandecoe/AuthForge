{%extends 'base.html'%}
{%block content%}
<div id = "top-title">
    <h2>My Profile</h2>
    <p>Manage your personal information and preferences</p>
</div>
<div id = "profile-container">

    <div id="main-display">
    <script>
    document.addEventListener("DOMContentLoaded", function () {

    function loadProfile() {
        fetch("/api/profile/")
            .then(res => res.json())  //changes it to json
            .then(data => {
                let container = document.getElementById("main-display");
                container.innerHTML = `
                    <h2>${data.Username}</h2>
                    <p>Email:${data.Email}</p>
                    <p>Bio:${data.bio}</p>
                `;
            })
            .catch(err => console.error("Fetch error:", err));
    }
    loadProfile();
});
</script>
    </div>
    <div id = "Account-Stats">
    <script>

    </script>
    </div>
    <div id = "Personal-Information">

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            function loadPersonalInfo(){
                fetch("/api/profile/")
                .then(res => res.json())
                .then(data => {
                    let container = document.getElementById("Personal-Information");
                    container.innerHTML = `
                    <h2>Personal Information</h2>
                    <p> FULL NAME: ${data.FullName}</p>
                    <p> PHONE NUMBER : ${data.Phone_Number}</p>
                    <p> EMAIL ADDRESS : ${data.Email} </p>
                    <p> LAST LOGIN : ${data.Last_Login}</p>
                    `;
                })
                .catch(err=> console.error("Fetch error:", err))
            }
            loadPersonalInfo();
        })
    </script>
    </div>
    <div id = "Security">
    <h3>Security</h3>
    <a href = "{% url 'password_change' %}">
    <button>Change Password</button>
    </a>
    </div>
    <div id = "Recent-activ">

    </div>
</div>
{% endblock content %}
