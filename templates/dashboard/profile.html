{%extends 'base.html'%}
{%block content%}
<div id = "top-title">
    <h2>My Profile</h2>
    <p>Manage your personal information and preferences</p>
</div>
<div id = "profile-container">

    <div id="main-display">
    <script>
        function loadProfile(){
            fetch("dashboard/api/profile")
            .then(data=> {
                let container = document.getElementById("main-display");
                container.innerHTML = `
                <h2>${data.profile_picture}</h2>
                <h2>${data.username}</h2>
                <p>${data.email}</p>
                <p>${data.bio}</p>
                `
            })
        }
        loadProfile();
    </script>
    </div>
    <div id = "Account-Stats">

    </div>
    <div id = "Personal-Information">

    </div>
    <div id = "Security">

    </div>
    <div id = "Recent-activ">

    </div>
</div>
{% endblock content %}
